<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Keycloak PKCE Demo</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        button { padding: 10px 20px; font-size: 16px; }
        pre { background: #f4f4f4; padding: 15px; overflow: auto; }
    </style>
</head>
<body>

<h1>Keycloak PKCE Flow Demo</h1>

<button onclick="login()">Login with Keycloak</button>

<h2>Tokens</h2>
<pre id="output">No tokens yet...</pre>

<script>
    const KEYCLOAK_URL = 'http://localhost:43947';
    const REALM = 'quarkus';
    const CLIENT_ID = 'course-ui';
    const REDIRECT_URI = window.location.origin + window.location.pathname;

    function base64UrlEncode(buffer) {
        return btoa(String.fromCharCode(...new Uint8Array(buffer)))
            .replace(/\+/g, '-')
            .replace(/\//g, '_')
            .replace(/=+$/, '');
    }

    async function generatePKCE() {
        const array = new Uint8Array(32);
        crypto.getRandomValues(array);
        const code_verifier = base64UrlEncode(array);

        const encoder = new TextEncoder();
        const data = encoder.encode(code_verifier);
        const digest = await crypto.subtle.digest('SHA-256', data);

        const code_challenge = base64UrlEncode(digest);

        return { code_verifier, code_challenge };
    }

    async function login() {
        const { code_verifier, code_challenge } = await generatePKCE();

        sessionStorage.setItem('code_verifier', code_verifier);

        const authUrl = `${KEYCLOAK_URL}/realms/${REALM}/protocol/openid-connect/auth` +
            `?response_type=code` +
            `&client_id=${CLIENT_ID}` +
            `&redirect_uri=${encodeURIComponent(REDIRECT_URI)}` +
            `&scope=openid profile email organization` +
            `&code_challenge=${code_challenge}` +
            `&code_challenge_method=S256`;

        window.location.href = authUrl;
    }

    async function handleCallback() {
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');

        if (!code) return;

        const code_verifier = sessionStorage.getItem('code_verifier');

        try {
            const response = await fetch(
                `${KEYCLOAK_URL}/realms/${REALM}/protocol/openid-connect/token`,
                {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: new URLSearchParams({
                        grant_type: 'authorization_code',
                        client_id: CLIENT_ID,
                        code: code,
                        redirect_uri: REDIRECT_URI,
                        code_verifier: code_verifier
                    })
                }
            );

            if (!response.ok) {
                const error = await response.text();
                throw new Error(error);
            }

            const tokens = await response.json();

            document.getElementById('output').textContent =
                JSON.stringify(tokens, null, 2);

            // Clean URL (remove ?code=...)
            window.history.replaceState({}, document.title, REDIRECT_URI);

        } catch (err) {
            document.getElementById('output').textContent =
                'Error: ' + err.message;
        }
    }

    // Run on page load
    handleCallback();
</script>

</body>
</html>
