quarkus.hibernate-orm.schema-management.strategy=drop-and-create
wallet.api.base.url=http://localhost:8081
quarkus.rest-client.wallet-api.uri=${wallet.api.base.url}
quarkus.datasource.jdbc.telemetry=true
quarkus.observability.lgtm.enabled=false

# Avoid OTEL logs
# 2026-03-23 23:34:36,449 WARNING [io.quarkus.opentelemetry.runtime.exporter.otlp.sender.VertxGrpcSender] (vert.x-eventloop-thread-8) Failed to export LogsRequestMarshaler. The request could not be executed. Full error message: Connection refused: localhost/127.0.0.1:4317
quarkus.log.category."io.quarkus.opentelemetry".level=ERROR

quarkus.http.cors.enabled=true
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.origins=*